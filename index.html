<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>yuro</title>
  <meta name="description" content="yuro - private research workstation. Researching efficient reasoning, mathematics, and implementations.">
  
  <!-- On-Screen Error Logger for Quick Debugging -->
  <script>
    window.onerror = function(message, source, lineno, colno, error) {
      const banner = document.createElement('div');
      banner.id = 'js-error-banner';
      banner.style.cssText = 'position:fixed; top:20px; left:50%; transform:translateX(-50%); background:#fee2e2; color:#b91c1c; border:1px solid #fca5a5; padding:16px 24px; border-radius:8px; z-index:999999; font-family:monospace; font-size:13px; max-width:90%; box-shadow:0 10px 25px rgba(0,0,0,0.15); line-height:1.4;';
      banner.innerHTML = '<strong>JavaScript Error Encountered:</strong><br>' + message + '<br><span style="opacity:0.75;font-size:11px;">at ' + source.split("/").pop() + ':' + lineno + ':' + colno + '</span>';
      document.body.appendChild(banner);
      return false;
    };
  </script>
  
  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  
  <!-- CSS Library Stylesheets -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.9/katex.min.css">
  
  <!-- Custom Stylesheet -->
  <link rel="stylesheet" href="./css/style.css">
</head>
<body>

  <!-- Root Application Wrapper -->
  <div id="app">
    
    <!-- ==================== HOMEPAGE SECTION ==================== -->
    <section id="home-view" class="view active">

      <video id="bg-video" autoplay loop muted playsinline>
        <source src="pinterest_gif_1782647478.webm" type="video/webm">
      </video>
      <!-- Glassmorphic Atmospheric Overlay -->
      <div id="bg-overlay"></div>
      
      <div class="home-container">
        <!-- Hero Section -->
        <header class="hero-section" id="hero-identity">
          <span class="hero-kicker">private research workstation</span>

          <p class="hero-tag">researching efficient reasoning</p>
          <p class="hero-disc">math / research / implementation</p>
          <div class="hero-line"></div>
        </header>
        
        <!-- Main Interactive Navigation -->
        <nav class="main-nav" aria-label="Workstation Navigation">
          <button id="nav-projects" class="nav-item" type="button">Projects</button>
          <button id="nav-tech" class="nav-item" type="button">Tech</button>
          <button id="nav-writings" class="nav-item" type="button">Writings</button>
          <div class="nav-dropdown-container">
            <button id="nav-socials" class="nav-item" type="button">
              Socials

            </button>
            <div id="socials-dropdown" class="socials-dropdown">
              <a href="https://github.com/yuro-py" target="_blank" rel="noreferrer" class="social-sublink">gh</a>
              <a href="https://x.com/yur_o_0" target="_blank" rel="noreferrer" class="social-sublink">x</a>
              <a href="https://www.linkedin.com/in/yuro-bb2688392/" target="_blank" rel="noreferrer" class="social-sublink">li</a>
              <a href="https://huggingface.co/yuro-py" target="_blank" rel="noreferrer" class="social-sublink">hf</a>
              <a href="mailto:yuroxebec@gmail.com" class="social-sublink">mail</a>
            </div>
          </div>
        </nav>
      </div>
      
      <!-- Projects Glassmorphic Overlay Panel -->
      <div id="projects-overlay" class="projects-overlay" role="dialog" aria-modal="true" aria-labelledby="projects-overlay-title">
        <div class="projects-card">
          <header class="projects-header">
            <h2 id="projects-overlay-title" class="projects-overlay-title">Projects</h2>
            <button id="close-projects" class="close-btn" aria-label="Close projects overlay">&times;</button>
          </header>
          <div id="projects-list" class="projects-list-content">
            <!-- Dynamically populated -->
          </div>
        </div>
      </div>
    </section>
    
    <!-- ==================== BLOG VIEW SECTION (LIGHT THEME) ==================== -->
    <section id="blog-view" class="view blog-theme-light">
      <div class="blog-grid">
        
        <!-- 20% Left Column -->
        <aside class="blog-col-left">
          <button class="btn-control btn-back-home" id="btn-back-home" type="button">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>

        </aside>

        <main class="blog-col-center">
          <!-- Blog Index (Post list) -->
          <div id="blog-list-container" class="blog-list-container">
            <header class="blog-header">
              <h1 id="blog-section-title" class="blog-section-title">Writings</h1>
              <p id="blog-section-subtitle" class="blog-section-subtitle">Thoughts on computation, math, and learning</p>
            </header>
            <div id="blog-items" class="blog-items-list">
              <!-- Dynamically populated -->
            </div>
          </div>
          
          <!-- Blog Reading View (Single post content) -->

              Back to List
            </button>
            <article id="blog-post-content" class="blog-post-markdown markdown-body">
              <!-- Dynamically rendered markdown content -->
            </article>
          </div>
        </main>
        
        <!-- 20% Right Column -->
        <aside class="blog-col-right"></aside>
        
      </div>
    </section>
    
  </div>

  <!-- CDN Scripts for Markdown parsing, sanitization, syntax highlighting, and LaTeX math rendering -->

  <script src="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.9/katex.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.9/contrib/auto-render.min.js"></script>
  
  <!-- Content Database -->

  <!-- Core Javascript Application -->
