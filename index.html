<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>yuro</title>
  <meta name="description" content="yuro - private research workstation. Researching efficient reasoning, mathematics, and implementations.">
  
  <!-- On-Screen Error Logger for Quick Debugging -->
  <script>
    window.onerror = function(message, source, lineno, colno, error) {
      const banner = document.createElement('div');
      banner.id = 'js-error-banner';
      banner.style.cssText = 'position:fixed; top:20px; left:50%; transform:translateX(-50%); background:#fee2e2; color:#b91c1c; border:1px solid #fca5a5; padding:16px 24px; border-radius:8px; z-index:999999; font-family:monospace; font-size:13px; max-width:90%; box-shadow:0 10px 25px rgba(0,0,0,0.15); line-height:1.4;';
      banner.innerHTML = '<strong>JavaScript Error Encountered:</strong><br>' + message + '<br><span style="opacity:0.75;font-size:11px;">at ' + source.split("/").pop() + ':' + lineno + ':' + colno + '</span>';
      document.body.appendChild(banner);
      return false;
    };
  </script>
  
  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
